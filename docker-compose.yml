version: '3.9'

services:

  # ── PostgreSQL ─────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: mmt_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       mmt_care_connect
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${DB_PASS:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/migrate.sql:/docker-entrypoint-initdb.d/01_migrate.sql
      - ./scripts/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mmt_care_connect"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── NestJS / Express Backend ───────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: mmt_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV:            production
      PORT:                4000
      DB_HOST:             postgres
      DB_PORT:             5432
      DB_NAME:             mmt_care_connect
      DB_USER:             postgres
      DB_PASS:             ${DB_PASS:-postgres}
      DB_POOL_MAX:         10
      JWT_SECRET:          ${JWT_SECRET:-change_this_in_production}
      JWT_REFRESH_SECRET:  ${JWT_REFRESH_SECRET:-change_refresh_secret}
      JWT_EXPIRES:         15m
      ALLOWED_ORIGINS:     http://localhost:3000,http://web:3000
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Next.js Web App ────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
    container_name: mmt_web
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
    ports:
      - "3000:3000"

volumes:
  postgres_data:
    driver: local
